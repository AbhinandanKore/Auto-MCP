<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCAD AI Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    .launcher {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #0b57d0;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .chat-popup {
      position: fixed;
      right: 20px;
      bottom: 90px;
      width: 360px;
      max-width: calc(100vw - 24px);
      height: 480px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.2);
      display: none;
      overflow: hidden;
      border: 1px solid #d9e0e7;
    }

    .chat-popup.open {
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 12px 14px;
      background: #0b57d0;
      color: white;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      border: none;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }

    .messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #f8fafc;
    }

    .msg {
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 90%;
      white-space: pre-wrap;
      line-height: 1.35;
      font-size: 14px;
    }

    .msg.user {
      margin-left: auto;
      background: #dbe9ff;
    }

    .msg.bot {
      margin-right: auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }

    .composer {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .composer input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
    }

    .composer button {
      border: none;
      border-radius: 8px;
      padding: 0 14px;
      background: #0b57d0;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="launcher" class="launcher" title="Open AI Chat">AI</button>

  <section id="chatPopup" class="chat-popup">
    <div class="chat-header">
      <span>AutoCAD AI Assistant</span>
      <button id="closeBtn" class="close-btn" title="Close">x</button>
    </div>

    <div id="messages" class="messages">
      <div class="msg bot">Type what you want to draw, for example:
draw a line from 0,0 to 50,50
create a circle of radius 5</div>
    </div>

    <div class="composer">
      <input id="userInput" type="text" placeholder="Describe what to draw...">
      <button id="sendBtn">Send</button>
    </div>
  </section>

  <script>
    const launcher = document.getElementById("launcher");
    const chatPopup = document.getElementById("chatPopup");
    const closeBtn = document.getElementById("closeBtn");
    const sendBtn = document.getElementById("sendBtn");
    const userInput = document.getElementById("userInput");
    const messages = document.getElementById("messages");

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = `msg ${type}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      userInput.value = "";
      addMessage("Working on it...", "bot");

      try {
        const response = await fetch("/ai-command", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        const data = await response.json();
        messages.lastChild.remove();

        if (!response.ok || data.status !== "success") {
          addMessage(`Error: ${data.message || "Request failed"}`, "bot");
          return;
        }

        addMessage(`Done. Executed: ${data.command}`, "bot");
      } catch (error) {
        messages.lastChild.remove();
        addMessage(`Error: ${error.message}`, "bot");
      }
    }

    launcher.addEventListener("click", () => {
      chatPopup.classList.toggle("open");
      if (chatPopup.classList.contains("open")) {
        userInput.focus();
      }
    });

    closeBtn.addEventListener("click", () => {
      chatPopup.classList.remove("open");
    });

    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
